# Politique cargo-deny : licences + advisories (cf. docs/BOOTSTRAP.md §6).
# C'est ce contrôle qui aurait levé le CVE rmcp Host-header.

[advisories]
yanked = "deny"
# « unmaintained » scopé au workspace : on garde la main sur NOS deps directes, mais on
# ne casse pas le build sur des deps transitives profondes (bincode/fxhash/proc-macro-
# error tirées par Loco/sea-orm) qu'on ne contrôle pas. Une vraie *vulnérabilité*, elle,
# casse toujours (advisories de sécurité non filtrées).
unmaintained = "workspace"
# Ignores d'advisories — au cas par cas, TOUJOURS justifiés + datés, à réévaluer
# quand la chaîne de deps bouge (suivi : issue #11 dette supply-chain).
ignore = [
  # quick-xml 0.38.4 — DoS au parsing XML (temps quadratique / alloc namespace non bornée).
  # Fix en >= 0.41.0, hors de portée : transitif via opendal 0.54.1 ← loco-rs 0.16.4,
  # contraint en ^0.38 (pas bumpable sans monter loco/opendal). NON-ATTEIGNABLE ici :
  # latch n'utilise PAS opendal (stockage = trait Storage/FsStorage maison, fichiers
  # locaux) ; quick-xml n'est nourri par aucune entrée non-fiable. À lever dès que
  # loco-rs tire quick-xml >= 0.41. (2026-07-02)
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]

[licenses]
# Repo dual-license MIT / Apache-2.0 ; on n'accepte que des licences permissives.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",                 # ex. adler (compression) — domaine public de fait
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "MPL-2.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",  # webpki-roots : bundle de certificats CA Mozilla (licence de données)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
