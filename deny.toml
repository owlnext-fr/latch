# Politique cargo-deny : licences + advisories (cf. docs/BOOTSTRAP.md §6).
# C'est ce contrôle qui aurait levé le CVE rmcp Host-header.

[advisories]
yanked = "deny"
# « unmaintained » scopé au workspace : on garde la main sur NOS deps directes, mais on
# ne casse pas le build sur des deps transitives profondes (bincode/fxhash/proc-macro-
# error tirées par Loco/sea-orm) qu'on ne contrôle pas. Une vraie *vulnérabilité*, elle,
# casse toujours (advisories de sécurité non filtrées).
unmaintained = "workspace"
# ignore = ["RUSTSEC-XXXX-XXXX"]  # à documenter au cas par cas si justifié

[licenses]
# Repo dual-license MIT / Apache-2.0 ; on n'accepte que des licences permissives.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",                 # ex. adler (compression) — domaine public de fait
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "MPL-2.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",  # webpki-roots : bundle de certificats CA Mozilla (licence de données)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
