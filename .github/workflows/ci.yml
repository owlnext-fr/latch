name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Format + lint (backend ; warnings = erreurs)
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # 2. Tests backend (Loco + SQLite de test) + drift OpenAPI
  test-backend:
    name: tests backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: taiki-e/install-action@16a76bb73558798e4218983c40c25fee9f2f99a8  # nextest
      - run: cargo nextest run
      # Drift check : regenerate openapi.json and fail if uncommitted changes
      - run: UPDATE_OPENAPI=1 cargo test --test openapi_drift
      - run: git diff --exit-code openapi.json

  # 3. Frontend React/Vite (lint / typecheck / test / build) + drift schema
  frontend:
    name: front (lint/typecheck/test/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          # L'action tourne à la racine (pas dans frontend/) → ne lit pas le
          # `packageManager` de frontend/package.json. On épingle explicitement.
          version: 9.15.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Drift schema : schema.d.ts commité doit correspondre à openapi.json
      - run: pnpm gen:api && git diff --exit-code src/api/schema.d.ts

  # 4. Supply-chain frontend (audit + licences)
  supply-chain-front:
    name: front supply-chain (audit + licences)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          # L'action tourne à la racine (pas dans frontend/) → ne lit pas le
          # `packageManager` de frontend/package.json. On épingle explicitement.
          version: 9.15.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm audit --audit-level=high
      # Allowlist calibrée sur les licences réellement présentes (mêmes familles que deny.toml) :
      # OFL-1.1 = police Inter (@fontsource-variable/inter) ; MPL-2.0 = aussi autorisée côté Rust.
      - run: pnpm dlx license-checker-rseidelsohn --production --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;BlueOak-1.0.0;Python-2.0;CC-BY-4.0;OFL-1.1;MPL-2.0' --excludePrivatePackages

  # 5. Supply-chain backend : licences + advisories (cargo-deny)
  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2
        with:
          command: check licenses advisories

  # 6. E2E Playwright (smoke admin) — gate après back + front
  e2e:
    name: e2e Playwright (smoke admin)
    runs-on: ubuntu-latest
    needs: [fmt-clippy, test-backend, frontend]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          # L'action tourne à la racine (pas dans frontend/) → ne lit pas le
          # `packageManager` de frontend/package.json. On épingle explicitement.
          version: 9.15.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile --ignore-scripts
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - run: cd frontend && pnpm exec playwright install --with-deps chromium
      - run: cd frontend && pnpm build
      - run: cd frontend && pnpm exec playwright test
        env:
          ADMIN_USER: admin
          ADMIN_PASS: secret

  # 7. Build de l'image (push GHCR public seulement sur main / tag)
  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [fmt-clippy, test-backend, supply-chain, frontend, supply-chain-front, e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: Métadonnées d'image (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/owlnext-fr/latch
          # flavor latest=auto (défaut) → `latest` posé sur le dernier tag semver.
          # Résultat : vX.Y.Z → X.Y.Z + X.Y + latest + sha- ; main → main + sha-.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
