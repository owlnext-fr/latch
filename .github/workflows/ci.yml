name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Format + lint (backend ; warnings = erreurs)
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # 2. Tests backend (Loco + SQLite de test) + drift OpenAPI + couverture lcov
  test-backend:
    name: tests backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3  # v2
        with:
          tool: cargo-llvm-cov,nextest
      - run: cargo llvm-cov nextest --lcov --output-path backend-lcov.info
      # Drift check : regenerate openapi.json and fail if uncommitted changes
      - run: UPDATE_OPENAPI=1 cargo test --test openapi_drift
      - run: git diff --exit-code openapi.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: backend-lcov
          path: backend-lcov.info

  # 3. Frontend React/Vite (lint / typecheck / test / build) + drift schema
  frontend:
    name: front (lint/typecheck/test/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: frontend
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Drift schema : schema.d.ts commité doit correspondre à openapi.json
      - run: pnpm gen:api && git diff --exit-code src/api/schema.d.ts

  # 4. Supply-chain frontend (audit + licences)
  supply-chain-front:
    name: front supply-chain (audit + licences)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: frontend
      - run: pnpm audit --audit-level=high
      # Allowlist calibrée sur les licences réellement présentes (mêmes familles que deny.toml) :
      # OFL-1.1 = police Inter (@fontsource-variable/inter) ; MPL-2.0 = aussi autorisée côté Rust.
      - run: pnpm dlx license-checker-rseidelsohn --production --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;BlueOak-1.0.0;Python-2.0;CC-BY-4.0;OFL-1.1;MPL-2.0' --excludePrivatePackages

  # 5. Supply-chain backend : licences + advisories (cargo-deny)
  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2
        with:
          command: check licenses advisories

  # 6. E2E Playwright (smoke admin) — gate après back + front. Backend (cargo) +
  # front (pnpm) requis : le test lance le binaire Loco qui sert le build sur :5150.
  e2e:
    name: e2e Playwright (smoke admin)
    runs-on: ubuntu-latest
    needs: [fmt-clippy, test-backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: frontend
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - run: cd frontend && pnpm exec playwright install --with-deps chromium
      - run: cd frontend && pnpm build
      - run: cd frontend && pnpm exec playwright test
        env:
          ADMIN_USER: admin
          ADMIN_PASS: secret

  # 7. E2E Playwright (smoke Vite dev-server) — même gate que e2e mais via :5173
  e2e-vite:
    name: e2e Playwright (smoke Vite dev-server)
    runs-on: ubuntu-latest
    needs: [fmt-clippy, test-backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: frontend
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - run: cd frontend && pnpm exec playwright install --with-deps chromium
      - run: cd frontend && pnpm build
      - run: cd frontend && pnpm test:vite
        env:
          ADMIN_USER: admin
          ADMIN_PASS: secret

  # 8. Analyse SonarQube Cloud (Quality Gate bloquant)
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: backend-lcov
          path: .
      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: frontend
      - run: cd frontend && pnpm test:cov
      - uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e  # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 9. Build de l'image (push GHCR public seulement sur main / tag)
  # Ne tourne QUE sur un `push` (branche `main` ou tag `v*`) : sur une PR, le build
  # d'image ne servait qu'à valider le Dockerfile sans jamais pousser (`push: false`),
  # au prix du job le plus lent de la CI. On l'économise sur les PR ; un Dockerfile
  # cassé sera vu au merge sur `main` (job rouge, aucune image poussée — fail-secure).
  docker:
    name: docker build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [fmt-clippy, test-backend, supply-chain, frontend, supply-chain-front, e2e, e2e-vite, sonar]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - name: Métadonnées d'image (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ghcr.io/owlnext-fr/latch
          # flavor latest=auto (défaut) → `latest` posé sur le dernier tag semver.
          # Résultat : vX.Y.Z → X.Y.Z + X.Y + latest + sha- ; main → main + sha-.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4  # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 10. Doc publique — build statique Fumadocs (validé à chaque push/PR)
  docs:
    name: docs (build statique)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: public_docs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version-file: public_docs/.nvmrc
          cache-dependency-path: public_docs/pnpm-lock.yaml
          working-directory: public_docs
      # postinstall (fumadocs-mdx) ne tourne pas avec --ignore-scripts → générer .source explicitement
      - run: pnpm exec fumadocs-mdx
      - run: pnpm build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: public_docs/out

  # 11. Doc publique — déploiement GitHub Pages (main uniquement)
  # Dépend de `docs` (le build) ET de `docker` : la publication ne doit avoir lieu
  # qu'APRÈS un push Docker réussi (cf. issue #1). Comme `docker` dépend lui-même de
  # toute la gate (fmt/clippy, tests, supply-chain, e2e, sonar), la doc n'est publiée
  # que si l'intégralité de la CI — build d'image compris — est verte : plus de doc
  # publiée alors que la CI plante après coup.
  deploy-docs:
    name: docs (deploy Pages)
    runs-on: ubuntu-latest
    needs: [docs, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      # Ne pas annuler un déploiement Pages en cours (le workflow est en
      # cancel-in-progress: true au global).
      group: pages
      cancel-in-progress: false
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

  # 12. Release automatisée sur tag v* : git-cliff génère les notes de la version
  # taguée et publie/met à jour la GitHub Release. Ne touche PAS au CHANGELOG.md
  # commité (qui reste la source, généré avant le tag) — on expose juste les notes
  # sans étape manuelle. Dépend de `docker` (⇒ toute la gate + image poussée) : pas
  # de release publiée si la CI ou le build d'image échoue (fail-secure, aligné sur
  # deploy-docs).
  release:
    name: release (git-cliff → GitHub Release)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # git-cliff a besoin de tout l'historique + les tags pour construire les notes.
          fetch-depth: 0
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3  # v2
        with:
          tool: git-cliff
      # Notes de la version taguée (section du tag qui contient HEAD, en-tête/pied strippés).
      - run: git cliff --current --strip all --output RELEASE_NOTES.md
      - name: Publier / mettre à jour la GitHub Release
        # Input non-fiable (nom de tag) passé en env quotée, jamais interpolé dans run:.
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md --verify-tag
          fi
